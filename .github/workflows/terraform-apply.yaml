name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - 'aws-s3/**'

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.10.5"
  AWS_REGION: "us-east-1"
  WORKING_DIR: "./aws-s3"

jobs:
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    environment: production      # requires manual approval gate in GitHub
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_APPLY_ROLE_ARN }}  # separate role, broader perms
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-apply

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: ${{ env.WORKING_DIR }}/.terraform
          key: terraform-${{ hashFiles('aws-s3/.terraform.lock.hcl') }}

      - name: Terraform Init
        run: |
          terraform init

      - name: Terraform Apply
        run: |
          terraform apply \
            -auto-approve \
            -no-color